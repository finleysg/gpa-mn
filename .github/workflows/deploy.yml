name: Deploy
run-name: "Deploy ${{ github.ref_name }}"

on:
  push:
    tags:
      - "web-v*"
      - "admin-v*"

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  build-web:
    if: startsWith(github.ref_name, 'web-v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL_WEB }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/web:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ github.repository }}/web:latest

  build-admin:
    if: startsWith(github.ref_name, 'admin-v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push admin image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/admin/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL_ADMIN }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/admin:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ github.repository }}/admin:latest

  deploy-web:
    needs: build-web
    if: startsWith(github.ref_name, 'web-v')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to CapRover (web)
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: ${{ vars.CAPROVER_SERVER }}
          app: ${{ vars.CAPROVER_API_WEB }}
          token: ${{ secrets.CAPROVER_TOKEN_WEB }}
          image: ${{ env.REGISTRY }}/${{ github.repository }}/web:${{ github.ref_name }}

  deploy-admin:
    needs: build-admin
    if: startsWith(github.ref_name, 'admin-v')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to CapRover (admin)
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: ${{ vars.CAPROVER_SERVER }}
          app: ${{ vars.CAPROVER_APP_ADMIN }}
          token: ${{ secrets.CAPROVER_TOKEN_ADMIN }}
          image: ${{ env.REGISTRY }}/${{ github.repository }}/admin:${{ github.ref_name }}

services:
  mysql:
    image: mysql:8.4.7
    ports:
      - "6200:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: gpamn
      MYSQL_USER: gpamn
      MYSQL_PASSWORD: gpamn_dev
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "6025:1025"
      - "8045:8025"

volumes:
  mysql_data:

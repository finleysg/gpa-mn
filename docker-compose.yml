services:
    mysql:
        image: mysql:8.4.7
        ports:
            - "6200:3306"
        environment:
            MYSQL_ROOT_PASSWORD: rootpassword
            MYSQL_DATABASE: gpamn
            MYSQL_USER: gpamn
            MYSQL_PASSWORD: gpamn_dev
        volumes:
            - mysql_data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            interval: 10s
            timeout: 5s
            retries: 5

    mailpit:
        image: axllent/mailpit:latest
        ports:
            - "6025:1025"
            - "8045:8025"

    web:
        build:
            context: .
            dockerfile: apps/web/Dockerfile.dev
        ports:
            - "80:3000"
        volumes:
            - ./apps/web/app:/app/apps/web/app
            - ./apps/web/public:/app/apps/web/public
            - ./packages:/app/packages
        env_file: ./apps/web/.env
        environment:
            DATABASE_URL: mysql://gpamn:gpamn_dev@mysql:3306/gpamn
            NEXT_PUBLIC_SITE_URL: http://gpa-web.localhost:1355
            NEXT_PUBLIC_SITE_URL_ADMIN: http://gpa-admin.localhost:1355
            ADMIN_INTERNAL_URL: http://admin:3000
        depends_on:
            mysql:
                condition: service_healthy
        restart: unless-stopped

    admin:
        build:
            context: .
            dockerfile: apps/admin/Dockerfile.dev
        ports:
            - "6100:3000"
        volumes:
            - ./apps/admin/app:/app/apps/admin/app
            - ./packages:/app/packages
        env_file: ./apps/admin/.env
        environment:
            DATABASE_URL: mysql://gpamn:gpamn_dev@mysql:3306/gpamn
            SMTP_HOST: mailpit
            SMTP_PORT: 1025
            NEXT_PUBLIC_SITE_URL: http://gpa-admin.localhost:1355
            WEB_URL: http://web:3000
        depends_on:
            mysql:
                condition: service_healthy
        restart: unless-stopped

volumes:
    mysql_data:
